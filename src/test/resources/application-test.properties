spring.datasource.url=jdbc:h2:mem:autowashpro_test;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

waitlist.cutoff-hours=12
waitlist.scheduler.enabled=false
waitlist.scheduler.interval-ms=3600000

app.mail.enabled=false
app.mail.from=test@autowashpro.local
app.mail.from-name=AutoWash Pro Test
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.test-connection=false

payos.payment-api-url=http://localhost/disabled
payos.client-id=test-client-id
payos.api-key=test-api-key
payos.checksum-key=test-checksum-key
payos.return-url=http://localhost/payment/success
payos.cancel-url=http://localhost/payment/cancel

research.anonymization-secret=test-research-anonymization-secret-32

cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret
upload.max-image-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
